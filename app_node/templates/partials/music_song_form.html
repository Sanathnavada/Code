<div class="section-head section-head--compact">
  <h3>Music Download</h3>
  <p>Use a song search, YouTube link, Spotify link, or a multi-line batch.</p>
</div>
<form class="stack-form" hx-post="/ui/music/song/submit" hx-target="#music-task-panel" hx-swap="innerHTML" hx-disabled-elt="find button" hx-indicator="find .submit-indicator">
  <div class="field">
    <label class="label" for="music-song-query">Song, YouTube, or Spotify input</label>
    <input class="input" type="text" id="music-song-query" name="query" placeholder="joji slow dancing in the dark or https://youtu.be/... or https://open.spotify.com/track/...">
  </div>
  <div class="field">
    <label class="label" for="music-song-batch">Batch inputs</label>
    <textarea class="textarea" id="music-song-batch" name="queries_text" rows="5" placeholder="One search or link per line"></textarea>
  </div>
  <button class="button button--wide" type="submit">Download Audio</button>
  <span class="submit-indicator" aria-live="polite">Submitting...</span>
</form>
